name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            goos: linux
            goarch: amd64
            binary_name: llmctl
            archive_name: llmctl-${{ github.ref_name }}-linux-amd64.tar.gz
          - os: ubuntu-latest
            name: linux-arm64
            goos: linux
            goarch: arm64
            binary_name: llmctl
            archive_name: llmctl-${{ github.ref_name }}-linux-arm64.tar.gz
- os: windows-latest
            name: windows-amd64
            goos: windows
            goarch: amd64
            binary_name: llmctl.exe
            archive_name: llmctl-${{ github.ref_name }}-windows-amd64.zip
          - os: windows-latest
            name: windows-arm64
            goos: windows
            goarch: arm64
            binary_name: llmctl.exe
            archive_name: llmctl-${{ github.ref_name }}-windows-arm64.zip
          - os: macos-latest
            name: darwin-amd64
            goos: darwin
            goarch: amd64
            binary_name: llmctl
            archive_name: llmctl-${{ github.ref_name }}-darwin-amd64.tar.gz
          - os: macos-latest
            name: darwin-arm64
            goos: darwin
            goarch: arm64
            binary_name: llmctl
            archive_name: llmctl-${{ github.ref_name }}-darwin-arm64.tar.gz

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o dist/${{ matrix.binary_name }} .

      - name: Package binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.archive_name }} -C dist ${{ matrix.binary_name }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/${{ matrix.binary_name }} -DestinationPath ${{ matrix.archive_name }} -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.archive_name }}

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          draft: false
          generate_release_notes: true
